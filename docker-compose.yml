# =====================================================
# DOCKER-COMPOSE MULTI-STAGE - EVAonline
# Security: Only Nginx exposes public ports (80/443).
# All other services communicate via internal network.
# =====================================================

services:
  # =====================================================
  # PostgreSQL Database with PostGIS
  # SECURITY: Internal network only (no public port)
  # =====================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: evaonline-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evaonline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-evaonline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SECURITY: Internal only — use Adminer (dev profile) for DB access
    expose:
      - "5432"
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evaonline}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - evaonline-network

  # =====================================================
  # Redis Cache & Message Broker
  # SECURITY: Internal network only (no public port)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: evaonline-redis
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # SECURITY: Internal only
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - evaonline-network

  # =====================================================
  # API Production
  # SECURITY: Internal only — Nginx proxies on port 80/443
  # =====================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime # ✅ Usa stage runtime do Dockerfile
    container_name: evaonline-api
    environment:
      - SERVICE=api
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    # SECURITY: Only expose internally (Nginx proxies)
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ✅ Health check para monitoramento
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - evaonline-network

  # =====================================================
  # API Development - Hot Reload
  # =====================================================
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # ✅ Stage development com hot-reload
    container_name: evaonline-api-dev
    environment:
      - SERVICE=api
      - ENVIRONMENT=development
      - RELOAD=true
      - LOG_LEVEL=DEBUG
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app # ✅ Montar projeto inteiro para hot-reload
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ✅ Health check para desenvolvimento
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - evaonline-network
    profiles: ["dev"]

  # =====================================================
  # 🔥 CORREÇÃO: Test Runner - usa stage testing
  # =====================================================
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: testing # ✅ Stage testing já inclui pytest e dependências
    container_name: evaonline-test-runner
    environment:
      - SERVICE=api
      - ENVIRONMENT=testing
      - TESTING=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - .:/app # ✅ Montar código para testes
      - ./test-reports:/app/test-reports # ✅ Relatórios de testes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - evaonline-network
    profiles: ["test"]
    # 🔥 REMOVIDO: command explícito - usa CMD do Dockerfile testing stage

  # =====================================================
  # Celery Worker - Production
  # =====================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: evaonline-celery-worker
    environment:
      - SERVICE=worker
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      # 📧 SMTP para envio de emails
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ✅ Health check: verify Redis connectivity for worker
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z redis 6379"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - evaonline-network

  # =====================================================
  # Celery Worker - Development
  # =====================================================
  celery-worker-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: evaonline-celery-worker-dev
    environment:
      - SERVICE=worker
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - .:/app # ✅ Hot-reload para tarefas Celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - evaonline-network
    profiles: ["dev"]

  # =====================================================
  # Celery Beat - Scheduled Tasks
  # =====================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: evaonline-celery-beat
    environment:
      - SERVICE=beat
      - ENVIRONMENT=production
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ✅ Health check: verify Redis connectivity for beat scheduler
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z redis 6379"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - evaonline-network

  # =====================================================
  # Celery Worker - ETo Calculations (CPU-intensive)
  # =====================================================
  celery-worker-eto:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: evaonline-celery-worker-eto
    environment:
      - SERVICE=worker-eto
      - ENVIRONMENT=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-evaonline}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-evaonline}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      # SMTP para envio de emails
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      # Worker especializado: apenas tarefas ETo
      - CELERY_QUEUES=eto
      - CELERY_CONCURRENCY=2 # Limitado para evitar sobrecarga
      - CELERY_PREFETCH_MULTIPLIER=1
      - CELERY_TASK_ROUTES={"backend.infrastructure.celery.tasks.eto_calculation.calculate_eto_task":{"queue":"eto"}}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./temp:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # ✅ Health check: verify Redis connectivity for worker
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z redis 6379"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - evaonline-network
    # 🔥 Escalável: pode ter múltiplas instâncias
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # =====================================================
  # Flower - Celery Monitoring
  # SECURITY: Internal only — Nginx proxies on /flower/
  # =====================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: evaonline-flower
    environment:
      - SERVICE=flower
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # Auth: credentials passed to entrypoint.sh for --basic_auth
      - FLOWER_USER=${FLOWER_USER:-admin}
      - FLOWER_PASSWORD=${FLOWER_PASSWORD:-admin}
      - FLOWER_URL_PREFIX=flower
    # SECURITY: Internal only (Nginx proxies on /flower/)
    expose:
      - "5555"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - celery-worker
      - redis
    restart: unless-stopped
    # ✅ Health check: verify Flower HTTP endpoint
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "nc -z localhost 5555"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - evaonline-network

  # =====================================================
  # Prometheus - Metrics Collection
  # SECURITY: Internal only — accessed only by Grafana
  # =====================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: evaonline-prometheus
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # SECURITY: Internal only (Grafana reads via internal network)
    expose:
      - "9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - evaonline-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # Grafana - Dashboards & Visualization
  # SECURITY: Internal only — Nginx proxies on /grafana/
  # =====================================================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: evaonline-grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # ✅ Autenticação habilitada
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_BASIC_ENABLED=true
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=warn
      # ✅ Sub-path: served at /grafana/
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    # SECURITY: Internal only (Nginx proxies on /grafana/)
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - evaonline-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/grafana/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # PostgreSQL Exporter - Metrics for Grafana
  # Exposes: pg_stat_activity_count, pg_stat_* metrics
  # =====================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: evaonline-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-evaonline}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-evaonline}?sslmode=disable"
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9187/metrics",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - evaonline-network

  # =====================================================
  # Redis Exporter - Metrics for Grafana
  # Exposes: redis_keyspace_hits_total, redis_commands_total
  # =====================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0-alpine
    container_name: evaonline-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9121/metrics",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - evaonline-network

  # =====================================================
  # Blackbox Exporter - HTTP probes for health checking
  # Exposes: probe_duration_seconds, probe_success
  # =====================================================
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: evaonline-blackbox-exporter
    volumes:
      - ./docker/monitoring/blackbox.yml:/config/blackbox.yml:ro
    command:
      - "--config.file=/config/blackbox.yml"
    expose:
      - "9115"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9115/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - evaonline-network

  # =====================================================
  # Nginx - Reverse Proxy & Security
  # ONLY service with public ports (80/443)
  # =====================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: evaonline-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # - "${NGINX_HTTPS_PORT:-443}:443"  # Uncomment when SSL is configured
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - evaonline-network

  # =====================================================
  # Database Admin (Development Only)
  # =====================================================
  adminer:
    image: adminer:4.8.1-standalone
    container_name: evaonline-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - evaonline-network
    profiles: ["dev"]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  nginx_logs:

networks:
  evaonline-network:
    driver: bridge
