# =====================================================
# EVAonline - Nginx Reverse Proxy Configuration
# =====================================================
# Version: 2.0.0
# Purpose: Security, SSL termination, rate limiting,
#          WebSocket proxy, static caching, /metrics blocking
# =====================================================

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # =========================================================
    # SECURITY: Hide Nginx version
    # =========================================================
    server_tokens off;

    # =========================================================
    # LOGGING: Structured format with timing
    # =========================================================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log main;

    # =========================================================
    # PERFORMANCE: TCP + Keepalive
    # =========================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # =========================================================
    # PERFORMANCE: Gzip Compression
    # =========================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # =========================================================
    # SECURITY: Rate Limiting Zones
    # =========================================================
    # API: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # General pages: 200 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;
    # WebSocket connections: 10 per second per IP
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=10r/s;
    # Admin panels (Grafana/Flower): 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=admin_panel:10m rate=30r/s;
    # Login/auth endpoints: 5 requests/minute per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

    # Custom error for rate limiting
    limit_req_status 429;

    # =========================================================
    # UPSTREAM: Backend Services
    # =========================================================
    upstream backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream grafana_upstream {
        server grafana:3000;
        keepalive 4;
    }

    upstream flower_upstream {
        server flower:5555;
        keepalive 4;
    }

    # =========================================================
    # HTTP → HTTPS Redirect (uncomment for production with SSL)
    # =========================================================
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name your-domain.com;
    #
    #     # Let's Encrypt challenge
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    # =========================================================
    # MAIN SERVER BLOCK
    # =========================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ----- SSL (uncomment for production) -----
        # listen 443 ssl http2;
        # listen [::]:443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache   shared:SSL:10m;
        # ssl_session_timeout 10m;
        # ssl_session_tickets off;
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # -------------------------------------------------
        # SECURITY HEADERS (applied to all responses)
        # -------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
        # Content-Security-Policy: Allow Dash/Plotly/Leaflet/Bootstrap resources
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://raw.githubusercontent.com; connect-src 'self' ws: wss: https://api.open-meteo.com https://power.larc.nasa.gov https://api.met.no https://api.weather.gov https://api.opentopodata.org https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
        # HSTS (uncomment for production with SSL)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # =================================================
        # 1. BLOCK: /metrics (NEVER expose publicly)
        # =================================================
        location = /metrics {
            deny all;
            return 404;
        }

        # =================================================
        # 2. API Routes: /api/v1/...
        # =================================================
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # =================================================
        # 3. WebSocket: /ws/...
        # =================================================
        location /ws/ {
            limit_req zone=websocket burst=5 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout: 30 minutes (matches backend)
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;

            # Disable buffering for real-time
            proxy_buffering off;
            proxy_cache off;
        }

        # =================================================
        # 4. Health Checks (public, no rate limit)
        # =================================================
        location = /api/v1/health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /api/v1/ready {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            access_log off;
        }

        # =================================================
        # 5. Grafana: /grafana/ (admin only)
        # =================================================
        location /grafana/ {
            limit_req zone=admin_panel burst=50 nodelay;

            # IP Whitelist (uncomment and adjust for production)
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # allow YOUR_ADMIN_IP/32;
            # deny all;

            proxy_pass http://grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Grafana WebSocket (live updates)
        location /grafana/api/live/ {
            proxy_pass http://grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # =================================================
        # 6. Flower: /flower/ (admin only)
        # =================================================
        location /flower/ {
            limit_req zone=admin_panel burst=50 nodelay;

            # IP Whitelist (uncomment and adjust for production)
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # allow YOUR_ADMIN_IP/32;
            # deny all;

            proxy_pass http://flower_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =================================================
        # 7. Dash Static Assets (cached)
        # =================================================
        location ~* ^/_dash-component-suites/.*\.(js|css|map)$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* ^/assets/.*\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";

            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # =================================================
        # 8. Dash Internal Callbacks (no rate limit)
        # =================================================
        location /_dash- {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =================================================
        # 9. Dash Frontend (catch-all)
        # =================================================
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =================================================
        # Error Pages
        # =================================================
        error_page 429 /429.html;
        location = /429.html {
            default_type text/html;
            return 429 '<!DOCTYPE html><html><head><title>429 Too Many Requests</title></head><body style="font-family:sans-serif;text-align:center;padding:50px"><h1>429 - Too Many Requests</h1><p>Please wait a moment and try again.</p><p><a href="/">Back to EVAonline</a></p></body></html>';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type text/html;
            return 502 '<!DOCTYPE html><html><head><title>EVAonline - Maintenance</title></head><body style="font-family:sans-serif;text-align:center;padding:50px"><h1>EVAonline is temporarily unavailable</h1><p>The system is under maintenance. Please try again in a few minutes.</p><p>Contact: <a href="mailto:support@evaonline.com">support@evaonline.com</a></p></body></html>';
        }
    }
}